<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1"
/>

<title>
Contact | Megacore
</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="config/env.js"></script>

<script
type="module"
src="js/supabase.js">
</script>

</head>

<body
class="
bg-slate-50
min-h-screen
">

<section
class="
max-w-6xl
mx-auto
px-6
py-16
">

<h1
class="
text-5xl
font-bold
mb-4
">

Contact Us

</h1>

<p
class="
text-gray-600
mb-10
">

Tell us about your project.

</p>

<div
class="
grid
md:grid-cols-2
gap-12
">

<div>

<form
id="contactForm"
class="space-y-5"
>

<input
name="name"

required

placeholder="Full Name"

class="
w-full
border
p-4
rounded
"
/>

<input

name="email"

type="email"

required

placeholder="Email"

class="
w-full
border
p-4
rounded
"
/>

<input

name="phone"

placeholder="Phone"

class="
w-full
border
p-4
rounded
"
/>

<textarea

name="message"

required

placeholder="Write your message"

class="
w-full
border
p-4
rounded
h-48
">

</textarea>

<button

class="
w-full
bg-orange-500
text-white
py-4
rounded
"

>

Send Message

</button>

</form>

<p
id="status"
class="
mt-6
font-medium
">
</p>

</div>

<div
class="
bg-white
rounded-xl
p-8
shadow
">

<h2
class="
text-2xl
font-bold
mb-6
">

Megacore Integrated Services Ltd

</h2>

<div class="space-y-4">

<p>
📍 Kofar Kaura,
Behind Taj Bank
</p>

<p>
📞 09021944502
</p>

<p>
✉️ ahmadmansurdra@gmail.com
</p>

<p>
Engineering • Solar • ICT • Contracting
</p>

</div>

</div>

</div>

</section>

<script type="module">

const form =
document
.getElementById(
'contactForm'
)

form
.addEventListener(
'submit',

async(e)=>{

e.preventDefault()

const data =
Object.fromEntries(
new FormData(form)
)

const {
error
}

=
await
window
.supabase

.from(
'contact_messages'
)

.insert(
[data]
)

const status =
document
.getElementById(
'status'
)

if(error){

status.innerText=
'Message failed'

return

}

status.innerText=
'Message sent successfully'

form.reset()

})

</script>

</body>

</html>
