<!DOCTYPE html>

<html>

<head>

<title>
Projects | Megacore
</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="config/env.js"></script>

<script type="module"
src="js/supabase.js">
</script>

</head>

<body
class="bg-slate-50"
>

<section
class="
max-w-7xl
mx-auto
p-8
"
>

<h1
class="
text-5xl
font-bold
mb-10
"
>

Projects

</h1>

<div

id="projects"

class="
grid
md:grid-cols-3
gap-8
"

>

Loading...

</div>

</section>

<script type="module">

const container =
document
.getElementById(
'projects'
)

const {
data,
error
}

=

await

window
.supabase

.from(
'projects'
)

.select('*')

if(error){

container.innerHTML=
'Failed to load'

}

else{

container.innerHTML=

data

.map(

project=>

`

<div
class="
bg-white
rounded-xl
shadow
p-6
">

<div
class="
h-48
bg-slate-200
rounded
mb-5
">
</div>

<h3
class="
text-2xl
font-bold
"
>

${project.title}

</h3>

<p
class="
text-orange-500
"
>

${project.category}

</p>

<p>

${project.location}

</p>

<p
class="
mt-4
text-gray-600
">

${project.description}

</p>

</div>

`

)

.join('')

}

</script>

</body>

</html>
