<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Megacore Integrated Services Ltd
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Poppins:wght@600;700&display=swap"
rel="stylesheet"
/>

<script src="config/env.js"></script>

<script
type="module"
src="js/supabase.js">
</script>

<link
rel="stylesheet"
href="css/style.css"
/>

<style>

body{
font-family:Inter,sans-serif;
}

.hero{

min-height:100vh;

background:

linear-gradient(
rgba(15,23,42,.88),
rgba(15,23,42,.88)
),

url("assets/images/hero.jpg");

background-size:cover;

background-position:center;

}

</style>

</head>

<body>

<!-- NAVBAR HERE -->

<!-- HERO -->

<section class="hero flex items-center">

<div class="max-w-7xl mx-auto px-6">

<div class="max-w-3xl">

<p class="text-orange-500 mb-4">
Integrated Engineering • Energy • ICT
</p>

<h1
class="
text-5xl
font-bold
text-white
"
>

Powering the Future
with Clean Energy

</h1>

<p
class="
text-gray-300
mt-6
"
>

Engineering services,
renewable energy,
electrical installation,
internet infrastructure.

</p>

</div>

</div>

</section>

<!-- FEATURED PROJECTS -->

<section
class="
py-24
bg-white
">

<div
class="
max-w-7xl
mx-auto
px-6
">

<h2
class="
text-4xl
font-bold
mb-10
">

Featured Projects

</h2>

<div

id="featuredProjects"

class="
grid
md:grid-cols-3
gap-8
"

>

Loading...

</div>

</div>

</section>

<script type="module">

const featured =
document
.getElementById(
"featuredProjects"
)

try{

const {
data
}

=

await

window
.supabase

.from(
"projects"
)

.select("*")

.eq(
"featured",
true
)

.limit(3)

featured.innerHTML =

data

.map(

p=>

`

<div
class="
bg-white
rounded-xl
shadow
p-6
">

<h3
class="
text-2xl
font-bold
">

${p.title}

</h3>

<p>
${p.category}
</p>

<p>
${p.location}
</p>

<p>
${p.description}
</p>

</div>

`

)

.join("")

}

catch{

featured.innerHTML=

"Unable to load projects"

}

</script>

<script src="js/app.js"></script>

</body>
